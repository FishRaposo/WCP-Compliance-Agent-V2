version: '3.8'

# WCP Compliance Agent — Local Development Infrastructure
# Provides PostgreSQL + pgvector for Phase 02 vector storage and hybrid retrieval.
#
# Usage:
#   docker compose up -d        # Start all services
#   docker compose down         # Stop (keep data)
#   docker compose down -v      # Stop and delete data volumes
#   docker compose logs -f      # Follow logs
#
# See: docs/development/postgres-setup.md

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector
  # Primary database for: decisions, human review queue, prompt registry,
  # and wage determination vectors (Phase 02 retrieval).
  # ---------------------------------------------------------------------------
  postgres:
    image: ankane/pgvector:latest
    container_name: wcp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wcp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-wcp_compliance}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro        # Mount migrations as read-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wcp_user} -d ${POSTGRES_DB:-wcp_compliance}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Elasticsearch — BM25 keyword search for DBWD corpus
  # Used by hybrid retrieval Layer 1 (Phase 02).
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: wcp_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
    name: wcp_postgres_data
  es_data:
    name: wcp_elasticsearch_data
