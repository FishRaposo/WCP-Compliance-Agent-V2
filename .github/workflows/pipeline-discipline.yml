name: Pipeline Discipline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ========================================================================
  # Pipeline Lint - Enforces Three-Layer Architecture
  # ========================================================================
  pipeline-lint:
    name: Pipeline Architecture Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run pipeline discipline lint
        run: npm run lint:pipeline

  # ========================================================================
  # Pipeline Tests - Unit and Integration
  # ========================================================================
  pipeline-tests:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    needs: pipeline-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run pipeline unit tests
        run: npm run test:pipeline

  # ========================================================================
  # Trust Calibration - Golden Set Evaluation
  # ========================================================================
  trust-calibration:
    name: Trust Calibration
    runs-on: ubuntu-latest
    needs: pipeline-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run trust calibration
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MOCK_MODE: ${{ vars.TRUST_CALIBRATION_MOCK_MODE || 'false' }}
        run: npm run test:calibration

  # ========================================================================
  # Coverage Report (optional, runs on PRs)
  # ========================================================================
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
